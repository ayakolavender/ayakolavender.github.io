# Your biography. Write one item per paragraph. Keep it concise; this is the
# "about me" shown on the home page.
bio:
  - >
    I'm a PhD candidate in Computer Science at the University of Example, advised
    by Prof. Ada Lovelace in the Trustworthy ML Lab. My research develops methods
    that make machine learning models interpretable without sacrificing accuracy.
  - >
    I care most about high-stakes settings such as healthcare and scientific
    discovery, where being right is not enough; we also need to understand why.
    Outside of research, I mentor undergraduates entering the field and write
    tutorials on the mathematics behind modern machine learning.

