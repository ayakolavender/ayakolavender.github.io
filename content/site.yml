# Optional extra buttons for the Links page (beyond the profiles above).
# links:
#   - label: "Book a meeting"
#     url: "https://calendly.com/example"
#   - label: "Newsletter"
#     url: "https://example.substack.com"

# -----------------------------------------------------------------------------
#  NAVIGATION PAGES  ::  what appears in the top menu, and in what order.
#  • Reorder the list to reorder the menu.
#  • Set `enabled: false` to hide a page completely.
#  • A page also hides automatically if its content file is empty.
#  • `label:` is optional and overrides the menu text.
#
#  (The home page is always shown and absorbs your bio, news, experience,
#   volunteering, education, awards and selected publications. Control those
#   blocks in home.yml.)
# -----------------------------------------------------------------------------
sections:
  - id: publications   # content/publications.yml
    enabled: true
  - id: talks          # content/talks.yml
    enabled: true
    label: "Talks"
  - id: workshops      # content/workshops.yml
    enabled: true
  - id: projects       # content/projects.yml
    enabled: true
  - id: gallery        # content/gallery.yml
    enabled: true
  - id: blog           # content/blog/*.md
    enabled: true
  - id: links          # the Links / contact page
    enabled: true

footer:
  note: ""             # Optional extra line in the footer
  showThemeToggle: true

seo:
  description: "Personal academic website of Lavender Ayako."
  # image: "assets/profile.svg"   # Optional social-share preview image

