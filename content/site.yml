# =============================================================================
#  SITE  ::  your identity, links, and which pages appear.
#  This is the most important file to edit. Everything here is safe to change.
#  YAML tip: use spaces (never tabs) for indentation, and keep the alignment.
# =============================================================================

profile:
  name: "Lavender Ayako"                    # Your full name (shown in the header + footer)
  shortName: "Lavender"                 # Optional: compact name for the header logo
  role: "MSc Student"
  affiliation: "University of Cape Town"
  email: "ayakolavender8@gmail.com"       # Shown as a contact link (leave "" to hide)
  location: "Kenya, available for relocation"       # Optional
  photo: "assets/picture.jpg"         # Put your photo in public/assets/ and point
                                      # here, e.g. "assets/profile.jpg". Leave "" to hide.

# One-line summary of your research, shown large on the home page.
tagline: "I design power systems and analyze their performance using computational methods to solve the real world problems in energy sector, I am passionate about creating sustainable solutions. I am actively seeking job opportunities research opportunities in the field of power systems, renewable energy, and grid optimization."


# Optional CV. Drop a PDF in public/assets/ and reference it here. Leave "" to hide the button.
cv: "assets/Lavenders_CV.pdf"

# -----------------------------------------------------------------------------
#  Links to your profiles. Delete any you don't use (only filled-in ones show).
# -----------------------------------------------------------------------------
