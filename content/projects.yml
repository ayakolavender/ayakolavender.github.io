- name: "Quantifying the impact of extreme wind speed on wind turbine performance using generalized extreme value distribution: A case study of South African wind farms"
  description: >
    A research project investigating the effects of extreme wind speeds on wind turbine performance using generalized extreme value distribution and identifying potential risks and mitigation strategies for wind energy systems in South Africa. I conducted a comprehensive analysis of wind speed data, developed statistical models, and evaluated the performance of wind turbines under extreme conditions. The findings contribute to the understanding of wind energy systems' resilience and inform decision-making for sustainable energy development.
