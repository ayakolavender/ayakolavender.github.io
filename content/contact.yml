# =============================================================================
#  CONTACT  ::  details shown on the Links page.
#  Everything here is optional. Leave a field as "" to hide it. Your email and
#  social links come from site.yml, so you may not need anything here at all.
# =============================================================================

# Overrides site.yml email if set; otherwise the Links page uses profile.email.
email: ""

# Office details are usually not needed for students, so they're blank (hidden)
# by default. Fill any of these in only if you want them shown.
office: ""
address: ""
officeHours: ""
