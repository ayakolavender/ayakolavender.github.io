name: Deploy to GitHub Pages

# Runs automatically on every push to `main`, and can be run manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      # Works out the correct base path automatically:
      #   • username.github.io repo      -> served at "/"        -> base "/"
      #   • any other repo (project page) -> served at "/repo/"  -> base "/repo/"
      #   • a custom domain (public/CNAME) -> served at "/"        -> base "/"
      - name: Compute base path & site URL
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO="${{ github.event.repository.name }}"
          REPO_LC=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          if [ -f public/CNAME ]; then
            echo "BASE_PATH=/" >> "$GITHUB_ENV"
            echo "SITE_URL=https://$(tr -d '[:space:]' < public/CNAME)" >> "$GITHUB_ENV"
          elif [ "$REPO_LC" = "$OWNER_LC.github.io" ]; then
            echo "BASE_PATH=/" >> "$GITHUB_ENV"
            echo "SITE_URL=https://$OWNER_LC.github.io" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=/$REPO/" >> "$GITHUB_ENV"
            echo "SITE_URL=https://$OWNER_LC.github.io" >> "$GITHUB_ENV"
          fi

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
